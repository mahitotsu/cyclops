version: '3'
services:
  webapp:
    build:
      context: ./
      args:
        -user: "1001:1001"
    volumes:
      - ./:/workdir
      - ~/.m2:/var/maven/.m2
    ports:
      - 9080:9080
      - 9443:9443
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s http://localhost:9080/actuator/health"]
      interval: 5s
      timeout: 30s
      retries: 5
      start_period: 60s
    depends_on:
      rdbcluster:
        condition: service_healthy
  rdbcluster:
    image: public.ecr.aws/docker/library/postgres:15.3-alpine
    environment:
      - POSTGRES_USER=pguser
      - POSTGRES_PASSWORD=pgpass
      - POSTGRES_DB=pgdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 30s
      retries: 5
      start_period: 30s
