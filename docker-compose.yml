version: '3'
services:
  webapp:
    build:
      context: ./
      args:
        -user: "1001:1001"
    volumes:
      - ./:/workdir
      - ~/.m2:/var/maven/.m2
    ports:
      - 9080:9080
      - 9443:9443
  rdbcluster:
    image: public.ecr.aws/docker/library/postgres:15.3-alpine
    environment:
      - POSTGRES_USER=pguser
      - POSTGRES_PASSWORD=pgpass
      - POSTGRES_DB=pgdb

